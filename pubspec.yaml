name: zuri_call
description: Flutter mobile MVP for the Zuri VoIP calling app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  drift: ^2.33.0
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  flutter:
    sdk: flutter
  flutter_contacts: ^2.2.0
  go_router: ^17.3.0
  http: ^1.6.0
  path: ^1.9.1
  path_provider: ^2.1.5
  sqlite3_flutter_libs: ^0.6.0+eol
  tabler_icons: ^2.5.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
